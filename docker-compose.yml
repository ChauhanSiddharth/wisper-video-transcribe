version: "3.9"

services:
  whisper-app:
    build: .
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    environment:
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - MAX_FILE_SIZE_MB=500
      - BACKEND_URL=http://localhost:8000
      - PORT=8501
    # Mount a volume only if you want persistent model cache across rebuilds.
    # volumes:
    #   - whisper_cache:/root/.cache
    restart: unless-stopped

# volumes:
#   whisper_cache:
